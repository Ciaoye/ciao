<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ciao</title>
<style>
/* ─── Vaporwave Design System ─── */
:root {
  --ink:#24123f; --deep:#5b31cf; --purple:#b48cff; --lav:#f0dcff;
  --pink:#ff78d7; --pink2:#ffd3f4; --cyan:#62e7ff; --green:#20e45f;
  --shadow:#3a2180; --glow:#b1ffd4;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:linear-gradient(160deg,#fad7ff 0%,#c7b2ff 45%,#73d4ff 100%);font-family:"Courier New",monospace;color:var(--ink);overflow:hidden}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.22) 0 1px,transparent 1px 24px),repeating-linear-gradient(90deg,rgba(255,255,255,.18) 0 1px,transparent 1px 24px);pointer-events:none;z-index:999;opacity:.7}

/* ─── Phone Frame ─── */
.phone{height:100dvh;max-width:430px;margin:0 auto;padding:10px 8px;position:relative}
.window{height:calc(100dvh - 20px);border:3px solid var(--ink);box-shadow:5px 5px 0 var(--shadow),inset 0 0 0 2px #fff;background:rgba(250,232,255,.84);display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ─── iOS-Style Status Bar ─── */
.statusbar{height:32px;background:rgba(0,0,0,.15);display:flex;align-items:center;justify-content:space-between;padding:0 18px 0 12px;font-size:12px;color:var(--ink);backdrop-filter:blur(4px)}
.statusbar .icons{display:flex;align-items:center;gap:4px;font-size:11px}
.statusbar .icons .batt{width:22px;height:10px;border:1.5px solid var(--ink);border-radius:2px;position:relative}
.statusbar .icons .batt::after{content:"";position:absolute;right:-3px;top:40%;width:2px;height:4px;background:var(--ink);border-radius:0 1px 1px 0}
.statusbar .icons .batt::before{content:"";position:absolute;left:1px;top:1px;bottom:1px;width:70%;background:var(--ink);border-radius:1px}

/* ─── Merged Header ─── */
.header{min-height:54px;background:linear-gradient(90deg,#ff8de4,#b994ff,#7de8ff);border-bottom:3px solid var(--ink);display:flex;align-items:center;padding:8px 14px;gap:10px}
.header .avatar{width:38px;height:38px;border-radius:50%;border:2px solid #ff65cf;background:#fff;object-fit:cover;box-shadow:2px 2px 0 #c668ff}
.header .info .name{font-size:18px;font-weight:900}
.header .online{font-size:12px}
.header .dot{display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%;border:1px solid #0b812e;margin-right:3px;box-shadow:0 0 5px var(--glow)}
.header .dot.off{background:#ff5e5e;box-shadow:0 0 5px #ff9999}
.header .actbtn{margin-left:auto;width:36px;height:36px;border:3px solid var(--ink);box-shadow:2px 2px 0 var(--shadow);background:#f8ddff;display:grid;place-items:center;font-size:18px;cursor:pointer}
.header .actbtn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--shadow)}

/* ─── Search Panel ─── */
.search{display:none;padding:8px 14px;border-bottom:3px solid var(--ink);background:#ffe0f8}
.search input{width:100%;height:36px;border:3px solid var(--ink);font:16px "Courier New";padding:0 10px;background:white;outline:none}
.search input:focus{border-color:var(--deep)}

/* ─── Chat Area ─── */
.chat{flex:1;overflow-y:auto;padding:18px 12px 14px;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,221,252,.16));scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-track{background:transparent}
.chat::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px}

/* ─── Message Rows ─── */
.row{display:flex;gap:8px;margin:0 0 14px;align-items:flex-end}
.row.me{justify-content:flex-end}
.row{animation:msgIn .25s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mini{width:32px;height:32px;border-radius:50%;border:2px solid #ff65cf;background:#fff;object-fit:cover;flex:0 0 auto}
.bubble{max-width:78%;padding:11px 12px 16px;border:2px solid var(--deep);box-shadow:3px 3px 0 var(--deep);background:linear-gradient(135deg,#eed8ff,#bb96ff);border-radius:16px 16px 4px 16px;position:relative;font-size:16px;line-height:1.35;word-break:break-word;white-space:pre-wrap}
.agent .bubble{border-color:#d64bbd;box-shadow:3px 3px 0 #d64bbd;background:linear-gradient(135deg,#fff0fb,#ffc3ef);border-radius:16px 16px 16px 4px}
.time{display:block;text-align:right;font-size:10px;opacity:.72;margin-top:4px}

/* ─── Typing ─── */
.thinking-label{font-size:12px;opacity:.6;margin-bottom:4px;letter-spacing:.5px}
.typing-dots{display:flex;gap:4px;padding:2px 0}
.typing-dots span{width:6px;height:6px;background:var(--ink);border-radius:50%;opacity:.4;animation:dotBounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,60%,100%{opacity:.2;transform:translateY(0)}30%{opacity:.8;transform:translateY(-4px)}}

/* ─── Welcome ─── */
.welcome{text-align:center;padding:36px 16px;opacity:.55}
.welcome .emoji{font-size:44px;margin-bottom:10px}
.welcome p{font-size:14px;line-height:1.8;color:var(--deep)}

/* ─── Composer ─── */
.composer{height:66px;border-top:3px solid var(--ink);background:linear-gradient(90deg,#ff8de4,#e3c1ff);padding:8px 10px;display:flex;gap:8px;align-items:center}
#msg{flex:1;height:44px;border:3px solid var(--ink);box-shadow:2px 2px 0 var(--shadow) inset;font:16px "Courier New";padding:0 12px;background:#fff7ff;color:var(--ink);outline:none}
#msg:focus{border-color:var(--deep)}
#send{width:52px;height:44px;border:3px solid var(--ink);background:#ffe2fb;box-shadow:3px 3px 0 var(--shadow);font-size:22px;color:var(--ink);cursor:pointer}
#send:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow)}
#send:disabled{opacity:.4;cursor:not-allowed}

/* ─── Bottom Spacer ─── */
.tabs{height:0}

@media (max-width:360px){.bubble{font-size:15px;max-width:82%}.info .name{font-size:18px}}
</style>
</head>

/* ─── Strip Markdown ─── */
function stripMarkdown(text) {
  return text
    .replace(/\$\\to\$/g, '→')
    .replace(/\$\\rightarrow\$/g, '→')
    .replace(/\$\\leftarrow\$/g, '←')
    .replace(/\$\\times\$/g, '×')
    .replace(/\$\\cdot\$/g, '·')
    .replace(/\$\\leq\$/g, '≤')
    .replace(/\$\\geq\$/g, '≥')
    .replace(/\$\\neq\$/g, '≠')
    .replace(/\*\*(.+?)\*\*/g, '$1')   // **bold**
    .replace(/__(.+?)__/g, '$1')       // __bold__
    .replace(/\*(.+?)\*/g, '$1')       // *italic*
    .replace(/_(.+?)_/g, '$1')         // _italic_
    .replace(/~~(.+?)~~/g, '$1')       // ~~strikethrough~~
    .replace(/`{1,3}(.+?)`{1,3}/g, '$1') // `code` ```code block```
    .replace(/^#{1,6}\s+/gm, '');      // # headers
}

function renderBubbleText(text) {
  return stripMarkdown(text).replace(/</g,'&lt;');
}

  clockEl.innerHTML = '<strong>'+h+':'+m+'</strong>';
}
updateClock();
setInterval(updateClock, 10000);

/* ─── Status ─── */
function setStatus(online) {
  statusDot.className = 'dot' + (online ? '' : ' off');
  statusLabel.textContent = online ? '在线' : '连接断开';
}

/* ─── Time ─── */
function timeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

/* ─── Search ─── */
function toggleSearch() {
  const p = document.getElementById('searchPanel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
  if (p.style.display === 'block') document.getElementById('searchInput').focus();
}
document.getElementById('searchInput').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.chat .row').forEach(r => {
    r.style.opacity = r.innerText.toLowerCase().includes(q) || !q ? '1' : '.18';
  });
});

/* ─── Render Messages ─── */
function pinLatestUserQuestion() {
  if (!latestUserRow) return;
  requestAnimationFrame(function() {
    chatEl.scrollTo({
      top: Math.max(0, latestUserRow.offsetTop - 18),
      behavior: 'smooth'
    });
  });
}

function addMessage(role, content) {
  if (welcomeMsg) welcomeMsg.remove();

  const row = document.createElement('div');
  row.className = 'row ' + (role === 'user' ? 'me' : 'agent');

  if (role === 'agent') {
    const img = document.createElement('img');
    img.className = 'mini'; img.src = LOGO_B64; img.alt = 'ciao';
    row.appendChild(img);
  }

  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = renderBubbleText(content);
  row.appendChild(b);
  chatEl.appendChild(row);
  if (role === 'user') {
    latestUserRow = row;
    pinLatestUserQuestion();
  }
  return b;
}

function createAgentBubble() {
  return addMessage('agent', '');
}

function splitAgentBubbles(content) {
  if (content.includes('<bubble>')) {
    return content
      .split(/\n?\s*<bubble>\s*\n?/g)
      .map(function(part) { return part.trim(); })
      .filter(Boolean)
      .slice(0, 3);
  }
  const normalized = content.trim();
  return normalized ? [normalized] : [];
}

function renderAgentBubbles(rawContent, bubbles) {
  const parts = splitAgentBubbles(rawContent);
  if (!parts.length) return bubbles;
  while (bubbles.length < parts.length) bubbles.push(createAgentBubble());
  for (let i = 0; i < bubbles.length; i++) {
    bubbles[i].style.display = i < parts.length ? '' : 'none';
    if (i < parts.length) bubbles[i].innerHTML = renderBubbleText(parts[i]);
  }
  return bubbles;
}

function createTyping() {
  const row = document.createElement('div');
  row.className = 'row agent typing'; row.id = 'typingRow';
  const img = document.createElement('img');
  img.className = 'mini'; img.src = LOGO_B64; img.alt = 'ciao';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = '<div class="thinking-label">ciao is typing</div><div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(img); row.appendChild(b);
  chatEl.appendChild(row);
  pinLatestUserQuestion();
}

function removeTyping() {
  const r = document.getElementById('typingRow');
  if (r) r.remove();
}

/* ─── Send ─── */
async function sendMsg() {
  try {
  const text = msgInput.value.trim();
  if (!text || isStreaming) return;

  msgInput.value = '';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  isStreaming = true;
  sendBtn.disabled = true;
  createTyping();

  try {
    const headers = { 'Content-Type':'application/json', 'Accept':'text/event-stream' };
    if (AGENT_TOKEN) headers['x-ciao-token'] = AGENT_TOKEN;

    const resp = await fetch(AGENT_URL, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({
        threadId: threadId, runId: 'r-'+Date.now(),
        messages: messages, tools: [], context: [], state: {}, forwardedProps: {}
      })
    });

    if (!resp.ok) {
      const eText = await resp.text().catch(function(){return '未知错误'});
      throw new Error('HTTP '+resp.status+': '+eText);
    }

    // Keep typing indicator visible, transition it into real bubble on first content
    let agentBubble = null, agentBubbles = [], fullContent = '', hasContent = false;
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream:true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (let i=0; i<lines.length; i++) {
        const line = lines[i];
        if (!line.startsWith('data: ')) continue;
        const jstr = line.slice(6).trim();
        if (!jstr) continue;

        try {
          const evt = JSON.parse(jstr);
          if (evt.type === 'TEXT_MESSAGE_CONTENT') {
            if (!agentBubble) {
              // Transition typing bubble → real bubble
              const typingRow = document.getElementById('typingRow');
              if (typingRow) {
                typingRow.id = '';
                typingRow.classList.remove('typing');
                const bub = typingRow.querySelector('.bubble');
                if (bub) { bub.innerHTML = ''; agentBubble = bub; agentBubbles = [bub]; }
              }
              if (!agentBubble) { agentBubble = addMessage('agent', ''); agentBubbles = [agentBubble]; }
              pinLatestUserQuestion();
            }
            fullContent += evt.delta || '';
            agentBubbles = renderAgentBubbles(fullContent, agentBubbles);
            hasContent = true;
          }
          if (evt.type === 'RUN_ERROR') {
            removeTyping();
            if (!agentBubble) agentBubble = addMessage('agent', '');
            fullContent = '嗯…我这里出了点问题：'+(evt.message||'');
            agentBubble.innerHTML = renderBubbleText(fullContent);
            hasContent = true;
            setStatus(false);
          }
        } catch(e) {}
      }
    }

    removeTyping(); // safety: remove if still lingering
    if (!hasContent) {
      setStatus(false);
      if (!agentBubble) agentBubble = addMessage('agent', '');
      agentBubble.innerHTML = renderBubbleText(fullContent||'嗯…我好像卡住了，没收到回复。要不你再说一次？');
    }
    if (fullContent) messages.push({role:'assistant',content:fullContent});
    setStatus(true);
  } catch(err) {
    removeTyping();
    addMessage('agent', '嗯…我这里出了点问题：'+err.message+'。要不你再说一次？');
    setStatus(false);
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
  }
  } catch(e) {
    console.error('sendMsg error:', e);
    addMessage('agent', '发送失败：'+e.message);
    isStreaming = false;
    sendBtn.disabled = false;
  }
}

form.addEventListener('submit', function(e){ e.preventDefault(); sendMsg(); });
